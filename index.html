<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Telegram Clone – Offline / Client-Side</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a192f;
            color: #e2e8f0;
            height: 100vh;
            overflow: hidden;
        }

        /* ────────────────────────────────────────────────
           Login / Register Screen
        ──────────────────────────────────────────────── */
        #auth-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            transition: opacity 0.6s ease;
        }

        #auth-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .auth-box {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 116, 139, 0.4);
            border-radius: 16px;
            padding: 32px 28px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .auth-box h1 {
            text-align: center;
            margin-bottom: 24px;
            font-size: 1.8rem;
            color: #60a5fa;
        }

        .auth-box input {
            width: 100%;
            padding: 14px 16px;
            margin: 12px 0;
            border: 1px solid #475569;
            border-radius: 10px;
            background: #1e293b;
            color: white;
            font-size: 1rem;
        }

        .auth-box input:focus {
            outline: none;
            border-color: #60a5fa;
            box-shadow: 0 0 0 3px rgba(96,165,250,0.2);
        }

        .auth-box button {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid #64748b;
            color: #94a3b8;
        }

        .btn-secondary:hover {
            background: rgba(100,116,139,0.15);
        }

        .toggle-link {
            text-align: center;
            margin-top: 16px;
            color: #60a5fa;
            cursor: pointer;
        }

        /* ────────────────────────────────────────────────
           Main App Layout
        ──────────────────────────────────────────────── */
        #app {
            display: none;
            height: 100vh;
            flex-direction: column;
        }

        #app.visible {
            display: flex;
        }

        header {
            background: #0f172a;
            padding: 12px 16px;
            border-bottom: 1px solid #1e293b;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 1.35rem;
            color: #60a5fa;
        }

        .header-icons {
            display: flex;
            gap: 20px;
            font-size: 1.3rem;
            color: #94a3b8;
        }

        .header-icons i:hover {
            color: #60a5fa;
            cursor: pointer;
        }

        /* ────────────────────────────────────────────────
           Chat List (left sidebar on desktop, full on mobile)
        ──────────────────────────────────────────────── */
        .chat-list-container {
            flex: 0 0 320px;
            background: #0f172a;
            border-right: 1px solid #1e293b;
            overflow-y: auto;
        }

        .chat-list-header {
            padding: 12px 16px;
            background: #1e293b;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .new-chat-btn {
            background: #0284c7;
            color: white;
            border: none;
            border-radius: 50%;
            width: 38px;
            height: 38px;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .chat-item {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .chat-item:hover,
        .chat-item.active {
            background: #1e293b;
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #60a5fa);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .chat-info {
            flex: 1;
            overflow: hidden;
        }

        .chat-name {
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-last-msg {
            font-size: 0.85rem;
            color: #94a3b8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 3px;
        }

        /* ────────────────────────────────────────────────
           Chat Area
        ──────────────────────────────────────────────── */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0a192f url('https://i.imgur.com/0y8TgrQ.png') repeat;
            background-size: 300px;
        }

        .chat-header {
            background: #0f172a;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            border-bottom: 1px solid #1e293b;
        }

        .back-btn {
            font-size: 1.4rem;
            color: #94a3b8;
            cursor: pointer;
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-header-name {
            font-weight: 600;
        }

        .chat-header-status {
            font-size: 0.82rem;
            color: #64748b;
        }

        .messages-container {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 14px;
            line-height: 1.4;
            position: relative;
        }

        .message.sent {
            background: #2d6aff;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.received {
            background: #1e293b;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 0.68rem;
            opacity: 0.7;
            margin-top: 4px;
            text-align: right;
        }

        .input-bar {
            background: #0f172a;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-top: 1px solid #1e293b;
        }

        .input-bar input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 24px;
            border: none;
            background: #1e293b;
            color: white;
            font-size: 1rem;
        }

        .input-bar input:focus {
            outline: none;
            box-shadow: 0 0 0 2px #60a5fa;
        }

        .input-bar button {
            background: none;
            border: none;
            color: #60a5fa;
            font-size: 1.4rem;
            cursor: pointer;
        }

        /* ────────────────────────────────────────────────
           Bottom Navigation (Telegram-like)
        ──────────────────────────────────────────────── */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: #0f172a;
            border-top: 1px solid #1e293b;
            display: flex;
            z-index: 1000;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            font-size: 0.75rem;
            gap: 4px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .nav-item.active,
        .nav-item:hover {
            color: #60a5fa;
        }

        .nav-item i {
            font-size: 1.5rem;
        }

        @media (max-width: 768px) {
            .chat-list-container {
                position: absolute;
                inset: 0;
                z-index: 10;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }

            .chat-list-container.visible {
                transform: translateX(0);
            }

            .chat-area {
                position: absolute;
                inset: 0;
            }
        }
    </style>
</head>
<body>

<!-- ────────────────────────────────────────────────
     Auth Screen (Login / Register)
───────────────────────────────────────────────── -->
<div id="auth-screen">
    <div class="auth-box" id="login-box">
        <h1>Telegram Clone</h1>
        <input type="text"     id="login-username" placeholder="Username or Phone" />
        <input type="password" id="login-password" placeholder="Password" />
        <button class="btn-primary" onclick="tryLogin()">Log in</button>
        <div class="toggle-link" onclick="showRegister()">Create new account</div>
    </div>

    <div class="auth-box hidden" id="register-box">
        <h1>Create Account</h1>
        <input type="text"     id="reg-username" placeholder="Username" />
        <input type="text"     id="reg-phone"    placeholder="Phone (optional)" />
        <input type="password" id="reg-password" placeholder="Password" />
        <button class="btn-primary" onclick="tryRegister()">Sign up</button>
        <div class="toggle-link" onclick="showLogin()">Already have an account?</div>
    </div>
</div>

<!-- ────────────────────────────────────────────────
     Main Application
───────────────────────────────────────────────── -->
<div id="app">

    <header>
        <h1>Telegram</h1>
        <div class="header-icons">
            <i class="fa-solid fa-magnifying-glass"></i>
            <i class="fa-solid fa-user-plus"></i>
        </div>
    </header>

    <div style="display:flex; flex:1; overflow:hidden;">

        <!-- Chat List -->
        <div class="chat-list-container" id="chatListPanel">
            <div class="chat-list-header">
                <div style="font-weight:600;">Chats</div>
                <button class="new-chat-btn" onclick="createNewChat()">+</button>
            </div>
            <div id="chatList"></div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area" id="chatArea">
            <div class="chat-header" id="chatHeader" style="display:none;">
                <i class="fa-solid fa-arrow-left back-btn" onclick="closeChatView()"></i>
                <div class="chat-avatar" id="chatAvatar"></div>
                <div class="chat-header-info">
                    <div class="chat-header-name" id="chatName">Chat</div>
                    <div class="chat-header-status" id="chatStatus">online</div>
                </div>
                <div style="font-size:1.3rem; color:#94a3b8;">
                    <i class="fa-solid fa-phone" style="margin-right:20px;"></i>
                    <i class="fa-solid fa-video"></i>
                </div>
            </div>

            <div class="messages-container" id="messagesContainer"></div>

            <div class="input-bar" id="inputBar" style="display:none;">
                <i class="fa-solid fa-face-smile"></i>
                <input type="text" id="messageInput" placeholder="Message" autocomplete="off"/>
                <i class="fa-solid fa-paperclip"></i>
                <button onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('chats')">
            <i class="fa-solid fa-comment"></i>
            <span>Chats</span>
        </div>
        <div class="nav-item" onclick="switchTab('status')">
            <i class="fa-solid fa-circle"></i>
            <span>Status</span>
        </div>
        <div class="nav-item" onclick="switchTab('channels')">
            <i class="fa-solid fa-bullhorn"></i>
            <span>Channels</span>
        </div>
        <div class="nav-item" onclick="switchTab('calls')">
            <i class="fa-solid fa-phone"></i>
            <span>Calls</span>
        </div>
        <div class="nav-item" onclick="switchTab('settings')">
            <i class="fa-solid fa-gear"></i>
            <span>Settings</span>
        </div>
    </div>
</div>

<script>
// ────────────────────────────────────────────────
// State
// ────────────────────────────────────────────────
let currentUser = null;
let currentChatId = null;
let chats = [];
let messages = {};

// OPFS handles
let rootDir, usersDir, chatsDir, messagesDir;

// ────────────────────────────────────────────────
// Auth Logic (very simplified – client-side only)
// ────────────────────────────────────────────────
function showLogin() {
    document.getElementById('login-box').classList.remove('hidden');
    document.getElementById('register-box').classList.add('hidden');
}

function showRegister() {
    document.getElementById('login-box').classList.add('hidden');
    document.getElementById('register-box').classList.remove('hidden');
}

async function tryRegister() {
    const username = document.getElementById('reg-username').value.trim();
    const password = document.getElementById('reg-password').value.trim();

    if (!username || !password) {
        alert("Please fill username and password");
        return;
    }

    await initStorageIfNeeded();

    // Check if user exists
    try {
        const fileHandle = await usersDir.getFileHandle(username + '.json');
        alert("Username already exists");
        return;
    } catch (e) {
        // good – user doesn't exist
    }

    const userData = {
        username,
        password: btoa(password), // extremely weak – demo only!
        created: new Date().toISOString(),
        avatar: "?"
    };

    const fileHandle = await usersDir.getFileHandle(username + '.json', {create:true});
    const writable = await fileHandle.createWritable();
    await writable.write(JSON.stringify(userData));
    await writable.close();

    alert("Account created! Please log in.");
    showLogin();
}

async function tryLogin() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value.trim();

    if (!username || !password) return alert("Fill credentials");

    await initStorageIfNeeded();

    try {
        const fileHandle = await usersDir.getFileHandle(username + '.json');
        const file = await fileHandle.getFile();
        const text = await file.text();
        const user = JSON.parse(text);

        if (user.password !== btoa(password)) {
            alert("Wrong password");
            return;
        }

        currentUser = user;
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('app').classList.add('visible');

        loadChats();
    } catch (err) {
        alert("User not found");
    }
}

// ────────────────────────────────────────────────
// Storage (OPFS)
// ────────────────────────────────────────────────
async function initStorageIfNeeded() {
    if (rootDir) return;
    rootDir     = await navigator.storage.getDirectory();
    usersDir    = await rootDir.getDirectoryHandle("users",    {create:true});
    chatsDir    = await rootDir.getDirectoryHandle("chats",    {create:true});
    messagesDir = await rootDir.getDirectoryHandle("messages", {create:true});
}

async function loadChats() {
    const listEl = document.getElementById('chatList');
    listEl.innerHTML = '';

    // For demo we show some default chats if none exist
    if (chats.length === 0) {
        chats = [
            {id:"1", name:"Alice", type:"private", lastMsg:"Hey! How are you?", avatar:"A"},
            {id:"2", name:"Family Group", type:"group", lastMsg:"Dinner at 8?", avatar:"FG"},
            {id:"3", name:"News Channel", type:"channel", lastMsg:"New update!", avatar:"N"},
        ];
        await saveChats();
    }

    chats.forEach(chat => {
        const div = document.createElement('div');
        div.className = 'chat-item';
        div.innerHTML = `
            <div class="chat-avatar">${chat.avatar}</div>
            <div class="chat-info">
                <div class="chat-name">${chat.name}</div>
                <div class="chat-last-msg">${chat.lastMsg || ''}</div>
            </div>
        `;
        div.onclick = () => openChat(chat.id, chat.name, chat.type);
        listEl.appendChild(div);
    });
}

async function saveChats() {
    // In real app you'd save per-user, here we just keep in memory + OPFS demo
    // For simplicity we skip full persistence of chat list
}

// ────────────────────────────────────────────────
// Chat UI Logic
// ────────────────────────────────────────────────
function openChat(id, name, type) {
    currentChatId = id;

    document.getElementById('chatName').textContent = name;
    document.getElementById('chatAvatar').textContent = name[0].toUpperCase();
    document.getElementById('chatStatus').textContent = type === 'channel' ? 'subscribers • 12.4K' : 'online';

    document.getElementById('chatHeader').style.display = 'flex';
    document.getElementById('inputBar').style.display = 'flex';

    // Mobile → hide list
    if (window.innerWidth <= 768) {
        document.getElementById('chatListPanel').classList.remove('visible');
    }

    loadMessages(id);
}

function closeChatView() {
    if (window.innerWidth <= 768) {
        document.getElementById('chatListPanel').classList.add('visible');
    }
    currentChatId = null;
    document.getElementById('chatHeader').style.display = 'none';
    document.getElementById('inputBar').style.display = 'none';
    document.getElementById('messagesContainer').innerHTML = '';
}

function loadMessages(chatId) {
    const container = document.getElementById('messagesContainer');
    container.innerHTML = '';

    // Demo messages – in real app load from OPFS per chat
    const demoMsgs = [
        {from:"them", text:"Hey! Long time no see 😄", time:"10:12"},
        {from:"them", text:"How's everything going?", time:"10:13"},
        {from:"me",   text:"Yo! All good man, just busy with work", time:"10:15"},
        {from:"me",   text:"What about you?", time:"10:15"},
        {from:"them", text:"Same here haha. Let's catch up soon!", time:"10:17"},
    ];

    demoMsgs.forEach(m => {
        const div = document.createElement('div');
        div.className = `message ${m.from === 'me' ? 'sent' : 'received'}`;
        div.innerHTML = `
            ${m.text}
            <div class="message-time">${m.time}</div>
        `;
        container.appendChild(div);
    });

    container.scrollTop = container.scrollHeight;
}

function sendMessage() {
    const input = document.getElementById('messageInput');
    if (!input.value.trim() || !currentChatId) return;

    const text = input.value.trim();
    input.value = '';

    const container = document.getElementById('messagesContainer');
    const div = document.createElement('div');
    div.className = 'message sent';
    div.innerHTML = `
        ${text}
        <div class="message-time">now</div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;

    // In real app → save to OPFS + update last message preview
}

// ────────────────────────────────────────────────
// Bottom Navigation (placeholder)
// ────────────────────────────────────────────────
function switchTab(tab) {
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    event.currentTarget.classList.add('active');

    // For demo we only really implement "Chats"
    if (tab !== 'chats') {
        alert(`Tab "${tab}" is not implemented in this demo version yet 🙏`);
    }
}

// ────────────────────────────────────────────────
// Create new chat / group / channel
// ────────────────────────────────────────────────
function createNewChat() {
    const name = prompt("Enter name for new chat / group / channel:");
    if (!name) return;

    const type = prompt("Type: private / group / channel", "private");
    const id = 'chat_' + Date.now();

    chats.push({
        id, name, type,
        avatar: name[0].toUpperCase(),
        lastMsg: "New chat started"
    });

    loadChats();
}

// Start
showLogin();
</script>
</body>
</html>
